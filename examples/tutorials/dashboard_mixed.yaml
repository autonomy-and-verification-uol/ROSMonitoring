ros_version: ros2
monitors:
  - monitor:
      id: dashboard_chatter_guard
      log: ./logs/dashboard_chatter_guard.jsonl
      status:
        enabled: true
        log: ./logs/status.jsonl
      oracle:
        url: 127.0.0.1
        port: 8080
        action: nothing
      topics:
        - name: chatter
          type: std_msgs.msg.String
          action: filter
          publishers:
            - chatter_talker
  - monitor:
      id: dashboard_ordered_pose_log
      log: ./logs/dashboard_ordered_pose_log.jsonl
      status:
        enabled: true
        log: ./logs/status.jsonl
      topics:
        - name: ordered_pose
          type: geometry_msgs.msg.PoseStamped
          action: log
          ordering:
            enabled: true
            max_delay_ms: 10000
